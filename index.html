<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ネライズ - スロット島図分析ツール</title>

  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-title" content="ネライズ">
  
  <style>
    :root {
      --main-red: #E60012;
      --accent-orange: #FF8C00;
      --deep-black: #1A1A1A;
      --light-gray: #f4f6f9;
      --border-color: #ddd;
    }

    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--light-gray); margin: 0; padding: 20px; color: #333; }
    .container { max-width: 1400px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    h1 { font-size: 24px; border-bottom: 3px solid var(--main-red); padding-bottom: 10px; margin-top: 0; color: var(--deep-black); }
    
    .filter-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 6px; border: 1px solid var(--border-color); }
    label { font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; }
    input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    
    button { width: 100%; padding: 12px; background: var(--deep-black); color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
    button:hover { background: var(--main-red); }
    
    #loading { display: none; text-align: center; font-weight: bold; color: var(--main-red); margin: 20px 0; }
    
    .tabs { display: flex; gap: 10px; margin-top: 20px; border-bottom: 2px solid var(--border-color); }
    .tab-btn { padding: 10px 20px; background: #e9ecef; border: none; cursor: pointer; border-radius: 5px 5px 0 0; font-weight: bold; transition: 0.2s; }
    .tab-btn.active { background: var(--main-red); color: white; }
    .tab-content { display: none; padding-top: 20px; }
    .tab-content.active { display: block; }

    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid var(--border-color); padding: 10px; text-align: center; }
    th { background-color: var(--deep-black); color: white; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    .rate-cell { font-weight: bold; color: var(--main-red); }

    .map-scroll-container { width: 100%; overflow: auto; background: #fff; padding: 15px; border: 1px solid var(--border-color); border-radius: 6px; max-height: 80vh; }
    
    /* CSS Grid基本設定 */
    .grid-map { 
      display: grid; 
      gap: 1px; 
      background-color: #e0e0e0; 
      width: max-content; 
    }
    
    .grid-cell { 
      font-size: 9px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-weight: bold; 
      user-select: none; 
      box-sizing: border-box; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      padding: 0 2px; 
    }
    .grid-cell:hover { outline: 2px solid var(--accent-orange); cursor: crosshair; z-index: 10; }
    .cell-machine-default { background-color: #d9d9d9 !important; color: #000000 !important; }
    .cell-rate-default { background-color: #ffffff !important; color: #000000 !important; }
    
    /* 機種名ラベル用スタイル（1マスも含め基本すべて左揃え） */
    .cell-text-label { 
      background-color: #f0f0f0 !important; 
      color: #1a1a1a !important; 
      font-weight: bold; 
      font-size: 8px; 
      border: 1px solid #ccc; 
      display: flex;
      align-items: center;
      justify-content: flex-start !important; /* ★ 1マス・複数マス問わず常に左揃え（はみ出し時に頭文字を維持） */
      text-align: left !important;
      white-space: nowrap !important;
      overflow: hidden; 
      text-overflow: ellipsis; 
      word-break: keep-all;
      box-sizing: border-box;
      padding: 0 2px;
      line-height: 1.1;
    }

    /* 縦書き用CSS（上揃え） */
    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: -0.5px;
      font-size: 8px;
      justify-content: flex-start !important; /* ★ 縦書きは上揃え */
      align-items: center;
      text-align: start !important;
    }

    .cell-empty { background-color: #ffffff !important; border: none !important; }

    @media (max-width: 768px) {
      .filter-group { grid-template-columns: 1fr !important; gap: 10px; padding: 10px; }
      .filter-group > div { width: 100% !important; box-sizing: border-box !important; }
      input, select {
        width: 100% !important; max-width: 100% !important; min-width: 0 !important; box-sizing: border-box !important;
        -webkit-appearance: none !important; appearance: none !important; height: 40px !important; color: #333333 !important; background-color: #ffffff !important;
      }
      button { width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; height: auto !important; }
      .tab-btn { width: auto !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://lh3.googleusercontent.com/d/1Rxr_lbg6avmphtp0D6JBydly1xcUFS73" 
         alt="ネライズ-スロット島図分析ツール" 
         style="height: 100px; width: auto; display: block; margin-bottom: 10px;">
    
    <div class="filter-group">
      <div>
        <label>開始日</label>
        <input type="date" id="startDate">
      </div>
      <div>
        <label>終了日</label>
        <input type="date" id="endDate">
      </div>
      <div>
        <label>特定日</label>
        <select id="b3"><option value="">すべて</option></select>
      </div>
      <div>
        <label>複合イベント</label>
        <select id="b4"><option value="">すべて</option></select>
      </div>
      <div>
        <label>曜日</label>
        <select id="b5">
          <option value="">すべて</option>
          <option value="日">日</option><option value="月">月</option><option value="火">火</option>
          <option value="水">水</option><option value="木">木</option><option value="金">金</option><option value="土">土</option>
        </select>
      </div>
    </div>
    
    <button onclick="executeAnalysis()">分析を実行</button>
    <div id="loading">⏳ データを集計中...（数秒かかります）</div>
    
    <div id="outputArea" style="display:none;">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('mapTab', this)">🗺️ 島図ヒートマップ</button>
        <button class="tab-btn" onclick="switchTab('listTab', this)">📋 データ一覧リスト</button>
      </div>

      <div id="mapTab" class="tab-content active">
        <div class="map-scroll-container">
          <div id="gridMap" class="grid-map"></div>
        </div>
      </div>

      <div id="listTab" class="tab-content">
        <table id="resultTable">
          <thead>
            <tr>
              <th>台番号</th>
              <th>Sランク回数</th>
              <th>対象日数</th>
              <th>Sランク獲得率</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxzl_mFcMUhiR-O-e4lCrDeN5IcVNjo4yvRtNpuish8Y5bmKAn4JwQxpP7d2pHSB7Cdvw/exec";

    window.onload = function() {
      fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getOptions" }),
        headers: { "Content-Type": "text/plain" }
      })
      .then(response => response.json())
      .then(res => {
        if (res.status === "success" && res.data) {
          var options = res.data;
          var b3Select = document.getElementById('b3');
          var b4Select = document.getElementById('b4');
          
          if (options.tokuteibi) {
            b3Select.innerHTML = '';
            var firstEl = document.createElement('option');
            firstEl.value = "";
            firstEl.textContent = "すべて";
            b3Select.appendChild(firstEl);

            options.tokuteibi.forEach(function(opt) {
              if (opt === "通常") return;
              var el = document.createElement('option');
              el.value = opt;
              el.textContent = opt;
              b3Select.appendChild(el);
            });
          }
          if (options.fukugo) {
            b4Select.innerHTML = '';
            var firstEl4 = document.createElement('option');
            firstEl4.value = "";
            firstEl4.textContent = "すべて";
            b4Select.appendChild(firstEl4);

            options.fukugo.forEach(function(opt) {
              if (opt === "-") return;
              var el = document.createElement('option');
              el.value = opt;
              el.textContent = opt;
              b4Select.appendChild(el);
            });
          }
        }
      })
      .catch(err => console.error("プルダウン取得失敗:", err));
    };

    function switchTab(tabId, btn) {
      var contents = document.querySelectorAll('.tab-content');
      for (var i = 0; i < contents.length; i++) contents[i].classList.remove('active');
      var buttons = document.querySelectorAll('.tab-btn');
      for (var j = 0; j < buttons.length; j++) buttons[j].classList.remove('active');
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    function executeAnalysis() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('outputArea').style.display = 'none';
      
      var conditions = {
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        b3: document.getElementById('b3').value,
        b4: document.getElementById('b4').value,
        b5: document.getElementById('b5').value
      };
      
      fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "runAnalysis", conditions: conditions }),
        headers: { "Content-Type": "text/plain" }
      })
      .then(response => response.json())
      .then(res => {
        if (res.status === "success") {
          showResults(res.data);
        } else {
          alert("エラー: " + res.message);
          document.getElementById('loading').style.display = 'none';
        }
      })
      .catch(err => {
        alert("通信エラーが発生しました: " + err);
        document.getElementById('loading').style.display = 'none';
      });
    }

    function getColorHex(rate) {
      var percent = Math.round(rate * 100);
      if (percent >= 25) return '#ff0000';
      if (percent >= 10 && percent <= 24) return '#ff9900';
      if (percent >= 1 && percent <= 9) return '#2196f3';
      return null;
    }

    function showResults(response) {
      document.getElementById('loading').style.display = 'none';
      if (!response || !response.mapLayout) {
        alert('エラー：島図データが取得できませんでした。');
        return;
      }
      document.getElementById('outputArea').style.display = 'block';
      
      var rateMap = {};
      var tbody = document.getElementById('resultBody');
      tbody.innerHTML = '';
      
      if (response.tableData) {
        response.tableData.forEach(function(row) {
          if (!row || row[0] === "" || row[0] === "台番号") return;
          var machineId = String(row[0]).trim();
          var sCount = Number(row[1]) || 0;
          var days = Number(row[2]) || 0;
          var rate = days > 0 ? (sCount / days) : 0;
          
          rateMap[machineId] = rate;
          
          var tr = document.createElement('tr');
          tr.innerHTML = '<td>' + machineId + '</td><td>' + sCount + '回</td><td>' + days + '日</td><td class="rate-cell">' + (rate * 100).toFixed(1) + '%</td>';
          tbody.appendChild(tr);
        });
      }

      var gridMap = document.getElementById('gridMap');
      gridMap.innerHTML = ''; 
      
      var layout = response.mapLayout;
      var mergeList = response.mergeList || [];

      var maxRows = layout.length;
      var maxCols = layout[0] ? layout[0].length : 0;

      // GRID の動的サイズ設定
      gridMap.style.gridTemplateColumns = 'repeat(' + maxCols + ', 30px)';
      gridMap.style.gridTemplateRows = 'repeat(' + maxRows + ', 24px)';

      var mergeMap = {};
      var skipMatrix = Array.from({ length: maxRows }, function() {
        return new Array(maxCols).fill(false);
      });

      mergeList.forEach(function(m) {
        if (m.row < maxRows && m.col < maxCols) {
          mergeMap[m.row + "_" + m.col] = m;
          for (var r = m.row; r < Math.min(m.row + m.numRows, maxRows); r++) {
            for (var c = m.col; c < Math.min(m.col + m.numCols, maxCols); c++) {
              if (r !== m.row || c !== m.col) {
                skipMatrix[r][c] = true;
              }
            }
          }
        }
      });

      function getVal(r, c) {
        if (r < 0 || r >= maxRows || c < 0 || c >= maxCols) return "";
        var val = layout[r][c];
        return val !== undefined && val !== null ? String(val).trim() : "";
      }

      var htmlBuilder = '';

      for (var r = 0; r < maxRows; r++) {
        for (var c = 0; c < maxCols; c++) {
          if (skipMatrix[r][c]) continue;

          var cellValue = getVal(r, c);
          var mergeInfo = mergeMap[r + "_" + c];
          
          var spanStyle = '';
          var isVertical = false;

          if (mergeInfo) {
            spanStyle = 'grid-column: span ' + mergeInfo.numCols + '; grid-row: span ' + mergeInfo.numRows + ';';
            if (mergeInfo.numRows > mergeInfo.numCols) {
              isVertical = true;
            }
          }

          if (cellValue === "") {
            htmlBuilder += '<div class="grid-cell cell-empty" style="' + spanStyle + '"></div>';
            continue;
          }

          var isMachine = (rateMap[cellValue] !== undefined);
          
          var matchedMachineId = "";
          if (!isMachine) {
            var searchOffsets = [
              {dr: -1, dc:  0}, {dr:  1, dc:  0}, {dr:  0, dc: -1}, {dr:  0, dc:  1},
              {dr: -2, dc:  0}, {dr:  2, dc:  0}, {dr:  0, dc: -2}, {dr:  0, dc:  2}
            ];
            for (var i = 0; i < searchOffsets.length; i++) {
              var offset = searchOffsets[i];
              var targetVal = getVal(r + offset.dr, c + offset.dc);
              if (targetVal !== "" && rateMap[targetVal] !== undefined) {
                if (cellValue.includes("%") || !isNaN(cellValue) || cellValue === "") {
                  matchedMachineId = targetVal;
                  break;
                }
              }
            }
          }
          var isRateCell = (matchedMachineId !== "");

          if (isMachine) {
            var rate = rateMap[cellValue];
            var color = getColorHex(rate);
            if (color) {
              htmlBuilder += '<div class="grid-cell" style="' + spanStyle + ' background-color: ' + color + '; color: #ffffff;" title="台: ' + cellValue + '\n確率: ' + (rate * 100).toFixed(1) + '%">' + cellValue + '</div>';
            } else {
              htmlBuilder += '<div class="grid-cell cell-machine-default" style="' + spanStyle + '" title="台: ' + cellValue + '\n確率: 0.0%">' + cellValue + '</div>';
            }
          } 
          else if (isRateCell) {
            var rate = rateMap[matchedMachineId];
            var color = getColorHex(rate);
            var displayPercent = rate !== undefined ? (rate * 100).toFixed(0) + "%" : cellValue;
            if (color) {
              htmlBuilder += '<div class="grid-cell" style="' + spanStyle + ' background-color: #ffffff; color: ' + color + ';" title="台: ' + matchedMachineId + '\n確率: ' + (rate * 100).toFixed(1) + '%">' + displayPercent + '</div>';
            } else {
              htmlBuilder += '<div class="grid-cell cell-rate-default" style="' + spanStyle + '" title="台: ' + matchedMachineId + '\n確率: 0.0%">' + displayPercent + '</div>';
            }
          } 
          else {
            // 機種名ラベル
            var vertClass = isVertical ? ' vertical-text' : '';
            
            // 文字数に応じてフォントサイズ調整
            var len = cellValue.length;
            var customFontSize = '8px';
            if (len > 12) {
              customFontSize = '6.5px';
            } else if (len > 8) {
              customFontSize = '7.5px';
            }

            htmlBuilder += '<div class="grid-cell cell-text-label' + vertClass + '" style="' + spanStyle + ' font-size: ' + customFontSize + ';" title="' + cellValue + '">' + cellValue + '</div>';
          }
        }
      }
      gridMap.innerHTML = htmlBuilder;
    }
  </script>
</body>
</html>
